    <h1>Calybridge</h1>

    <p>
        Calybridge is a desktop application that synchronizes calendar events
        between Yandex Calendar and Google Calendar.
    </p>

    <h3>Features</h3>
    <ul>
        <li>Automatic synchronization</li>
        <li>Multiple calendar support</li>
        <li>Local data processing</li>
    </ul>
